<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatApp - Secure Workspace</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
  * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
  body { background: #030303; overflow: hidden; }
  input:-webkit-autofill { -webkit-box-shadow: 0 0 0 100px #18181b inset !important; -webkit-text-fill-color: #f4f4f5 !important; }
  
  /* Double Bezel Card styles */
  .double-bezel-outer {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
  }
  
  .double-bezel-inner {
    background: #09090b;
    border: 1px solid rgba(255, 255, 255, 0.04);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.08);
  }

  .input-field { 
    background: rgba(255, 255, 255, 0.02); 
    border: 1px solid rgba(255, 255, 255, 0.05); 
    color: #f4f4f5; 
    transition: all 0.25s cubic-bezier(0.32, 0.72, 0, 1); 
  }
  .input-field:focus { 
    outline: none; 
    border-color: rgba(99, 102, 241, 0.5); 
    background: rgba(99, 102, 241, 0.02); 
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12); 
  }
  .input-field::placeholder { color: rgba(255, 255, 255, 0.25); }
  
  .form-panel { opacity: 0; transform: translateX(12px); }
  .field-icon { color: rgba(255, 255, 255, 0.25); transition: color 0.2s; }
  .input-field:focus + .field-icon, .input-field:focus ~ .field-icon { color: #818cf8; }

  /* Ambient mesh glows */
  .glow-orb-1 {
    background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
  }
  .glow-orb-2 {
    background: radial-gradient(circle, rgba(124, 58, 237, 0.05) 0%, transparent 70%);
  }
</style>
</head>
<body class="h-screen flex items-stretch select-none">

<!-- LEFT: Canvas Grid Kinetic Scene -->
<div class="relative flex-1 overflow-hidden hidden md:block" id="leftPanel">
  <canvas id="kineticCanvas" class="absolute inset-0 w-full h-full"></canvas>
  <div class="absolute inset-0 bg-gradient-to-r from-transparent via-transparent to-[#030303]/90 pointer-events-none"></div>

  <!-- Ambient Glow in Canvas -->
  <div class="absolute -top-1/4 -left-1/4 w-[80%] h-[80%] glow-orb-1 rounded-full pointer-events-none blur-3xl"></div>
  <div class="absolute -bottom-1/4 -right-1/4 w-[80%] h-[80%] glow-orb-2 rounded-full pointer-events-none blur-3xl"></div>

  <!-- Bottom content banner -->
  <div class="absolute bottom-0 left-0 right-0 p-12 pointer-events-none" id="leftText" style="opacity:0">
    <div class="text-5xl font-semibold text-white leading-tight tracking-tight mb-4">
      Real conversations.<br>
      <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-violet-400 to-indigo-200">Refined and secure.</span>
    </div>
    <p class="text-zinc-500 text-sm font-light tracking-wide max-w-[45ch]">Experience end-to-end lightning-fast messaging in a minimalist, workspace-focused environment.</p>
    
    <div class="flex items-center gap-4 mt-8">
      <div class="flex -space-x-2">
        <div class="w-8 h-8 rounded-full bg-zinc-900 border border-white/10 flex items-center justify-center text-[11px] text-indigo-400 font-semibold shadow-md">01</div>
        <div class="w-8 h-8 rounded-full bg-zinc-900 border border-white/10 flex items-center justify-center text-[11px] text-violet-400 font-semibold shadow-md">02</div>
        <div class="w-8 h-8 rounded-full bg-zinc-900 border border-white/10 flex items-center justify-center text-[11px] text-emerald-400 font-semibold shadow-md">03</div>
      </div>
      <span class="text-zinc-500 text-xs">Empowering secure communication channels</span>
    </div>
  </div>
</div>

<!-- RIGHT: Auth Form Panel -->
<div class="w-full md:w-[460px] flex-shrink-0 flex items-center justify-center p-6 relative overflow-hidden bg-[#030303]" style="border-left: 1px solid rgba(255,255,255,0.06)">

  <!-- Backstage glows -->
  <div class="absolute top-0 right-0 w-80 h-80 glow-orb-1 rounded-full pointer-events-none blur-3xl transform translate-x-1/3 -translate-y-1/3"></div>
  <div class="absolute bottom-0 left-0 w-80 h-80 glow-orb-2 rounded-full pointer-events-none blur-3xl transform -translate-x-1/3 translate-y-1/3"></div>

  <!-- Double Bezel Card Wrapper -->
  <div class="w-full max-w-sm double-bezel-outer p-[5px] rounded-[2rem] z-10" id="authCardWrapper" style="opacity:0">
    <div class="w-full double-bezel-inner p-8 rounded-[calc(2rem-5px)]">

      <!-- Logo & Header -->
      <div class="text-center mb-8" id="logoArea">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-[1.2rem] bg-gradient-to-tr from-indigo-500 to-violet-600 shadow-[0_8px_24px_rgba(99,102,241,0.25)] border border-white/10 mb-4">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.12 2.9 2.78 2.9h.19a.75.75 0 01.53.22l3.83 3.83a.75.75 0 001.27-.53V17.25c0-.41.34-.75.75-.75h.97c1.66 0 2.78-1.3 2.78-2.9V6.44c0-1.6-1.12-2.9-2.78-2.9H6.03c-1.66 0-2.78 1.3-2.78 2.9v7.91z" />
          </svg>
        </div>
        <h1 class="text-xl font-semibold text-white tracking-tight">ChatApp</h1>
        <p class="text-[10px] tracking-[0.25em] text-zinc-500 uppercase mt-1">Workspace Login</p>
      </div>

      <!-- Sliding Indicator Tabs -->
      <div class="relative flex p-1 mb-6 bg-[#121215] border border-white/[0.04] rounded-xl" id="authTabs">
        <!-- Sliding Highlight -->
        <div id="tabIndicator" class="absolute top-[3px] bottom-[3px] left-[3px] w-[calc(50%-4px)] bg-white/[0.06] border border-white/[0.04] rounded-lg shadow-sm transition-all duration-300 ease-[cubic-bezier(0.25,1,0.5,1)]"></div>
        <button id="tabLogin" onclick="switchTab('login')" class="relative z-10 flex-1 py-2 text-xs font-semibold text-white transition-colors duration-200">Sign In</button>
        <button id="tabReg" onclick="switchTab('reg')" class="relative z-10 flex-1 py-2 text-xs font-semibold text-zinc-400 hover:text-white transition-colors duration-200">Create Account</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="form-panel space-y-4" onsubmit="doLogin(event)">
        <div class="relative">
          <input id="loginId" type="text" placeholder="Email or Username" autocomplete="username"
            class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-xs font-medium" />
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 field-icon">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
          </span>
        </div>
        <div class="relative">
          <input id="loginPw" type="password" placeholder="Password" autocomplete="current-password"
            class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-xs font-medium" />
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 field-icon">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
        <button type="submit" class="group relative w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-semibold tracking-wide shadow-[0_4px_16px_rgba(99,102,241,0.2)] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 mt-2">
          <span>Sign In</span>
          <div class="w-5 h-5 rounded-full bg-white/10 flex items-center justify-center scale-90 group-hover:scale-100 group-hover:translate-x-0.5 transition-all duration-200">
            <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </div>
        </button>
        <div id="loginErr" class="text-red-400 text-xs text-center min-h-[16px] font-medium tracking-wide"></div>
      </form>

      <!-- REGISTER FORM -->
      <form id="regForm" class="form-panel space-y-4 hidden" onsubmit="doRegister(event)">
        <div class="relative">
          <input id="regUser" type="text" placeholder="Username" autocomplete="username"
            class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-xs font-medium" />
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 field-icon">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
          </span>
        </div>
        <div class="relative">
          <input id="regEmail" type="email" placeholder="Email" autocomplete="email"
            class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-xs font-medium" />
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 field-icon">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
          </span>
        </div>
        <div class="relative">
          <input id="regPw" type="password" placeholder="Password (min 6, 1 letter + 1 number)" autocomplete="new-password"
            class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-xs font-medium" />
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 field-icon">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
        <button type="submit" class="group relative w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-semibold tracking-wide shadow-[0_4px_16px_rgba(99,102,241,0.2)] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 mt-2">
          <span>Create Account</span>
          <div class="w-5 h-5 rounded-full bg-white/10 flex items-center justify-center scale-90 group-hover:scale-100 group-hover:translate-x-0.5 transition-all duration-200">
            <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          </div>
        </button>
        <div id="regErr" class="text-red-400 text-xs text-center min-h-[16px] font-medium tracking-wide"></div>
      </form>

      <!-- Footer links -->
      <p class="text-[9px] text-zinc-600 text-center mt-8 tracking-widest uppercase">Secure · Private · Fast</p>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let activeTab = 'login';

// ===== ANIMATE IN =====
window.addEventListener('load', () => {
  anime({ targets: '#authCardWrapper', opacity: [0, 1], translateY: [30, 0], duration: 800, easing: 'easeOutExpo', delay: 100 });
  anime({ targets: '#leftText', opacity: [0, 1], translateY: [20, 0], duration: 800, easing: 'easeOutExpo', delay: 250 });
  anime({ targets: '#loginForm', opacity: [0, 1], translateX: [12, 0], duration: 600, easing: 'easeOutExpo', delay: 200 });
  initKineticBg();
});

// ===== KINETIC BG =====
function initKineticBg() {
  const canvas = document.getElementById('kineticCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let animationFrameId;

  function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const particles = [];
  const count = 45;
  const maxDist = 130;

  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.35,
      vy: (Math.random() - 0.5) * 0.35,
      radius: Math.random() * 1.5 + 1
    });
  }

  let mouse = { x: -1000, y: -1000 };
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  });
  canvas.addEventListener('mouseleave', () => {
    mouse.x = -1000;
    mouse.y = -1000;
  });

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Subtle grid lines
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.012)';
    ctx.lineWidth = 1;
    const gridSpacing = 48;
    for (let x = 0; x < canvas.width; x += gridSpacing) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += gridSpacing) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }

    // Update and draw particles
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

      // Gentle mouse interaction
      if (mouse.x > 0) {
        const dx = mouse.x - p.x;
        const dy = mouse.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 140) {
          p.x += dx * 0.006;
          p.y += dy * 0.006;
        }
      }

      ctx.fillStyle = 'rgba(99, 102, 241, 0.12)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
    });

    // Draw connection lines
    for (let i = 0; i < count; i++) {
      for (let j = i + 1; j < count; j++) {
        const p1 = particles[i];
        const p2 = particles[j];
        const dx = p1.x - p2.x;
        const dy = p1.y - p2.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < maxDist) {
          const alpha = (1 - dist / maxDist) * 0.07;
          ctx.strokeStyle = `rgba(99, 102, 241, ${alpha})`;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }
      }
    }

    animationFrameId = requestAnimationFrame(draw);
  }

  draw();
}

// ===== TABS =====
function switchTab(tab) {
  if (activeTab === tab) return;
  activeTab = tab;
  const isLogin = tab === 'login';

  // Animate sliding tab highlight
  const indicator = document.getElementById('tabIndicator');
  if (isLogin) {
    indicator.style.transform = 'translateX(0)';
    document.getElementById('tabLogin').className = 'relative z-10 flex-1 py-2 text-xs font-semibold text-white transition-colors duration-200';
    document.getElementById('tabReg').className = 'relative z-10 flex-1 py-2 text-xs font-semibold text-zinc-400 hover:text-white transition-colors duration-200';
  } else {
    indicator.style.transform = 'translateX(100%)';
    document.getElementById('tabLogin').className = 'relative z-10 flex-1 py-2 text-xs font-semibold text-zinc-400 hover:text-white transition-colors duration-200';
    document.getElementById('tabReg').className = 'relative z-10 flex-1 py-2 text-xs font-semibold text-white transition-colors duration-200';
  }

  const showForm = isLogin ? 'loginForm' : 'regForm';
  const hideForm = isLogin ? 'regForm' : 'loginForm';

  const hideEl = document.getElementById(hideForm);
  anime({ targets: hideEl, opacity: [1, 0], translateX: [0, isLogin ? 12 : -12], duration: 150, easing: 'easeInCubic',
    complete: () => {
      hideEl.classList.add('hidden');
      const showEl = document.getElementById(showForm);
      showEl.classList.remove('hidden');
      anime({ targets: showEl, opacity: [0, 1], translateX: [isLogin ? -12 : 12, 0], duration: 220, easing: 'easeOutCubic' });
    }
  });

  document.getElementById('loginErr').textContent = '';
  document.getElementById('regErr').textContent = '';
}

// ===== AUTH CALLS =====
async function doLogin(e) {
  e.preventDefault();
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const isEmail = id.includes('@');
  const body = isEmail ? { email: id, password: pw } : { username: id, password: pw };
  try {
    const r = await fetch(`${API}/api/v1/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    anime({ targets: '#authCardWrapper', opacity: [1, 0], translateY: [0, -10], duration: 250, easing: 'easeInCubic',
      complete: () => { localStorage.setItem('chatapp_token', JSON.stringify(d)); window.location.href = '/static/'; }
    });
  } catch (err) {
    errEl.textContent = err.message;
    anime({ targets: '#loginErr', keyframes: [{ translateX: -4 }, { translateX: 4 }, { translateX: -2 }, { translateX: 0 }], duration: 250, easing: 'easeInOutSine' });
  }
}

async function doRegister(e) {
  e.preventDefault();
  const errEl = document.getElementById('regErr');
  errEl.textContent = '';
  try {
    const r = await fetch(`${API}/api/v1/auth/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: document.getElementById('regUser').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPw').value })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Registration failed');
    anime({ targets: '#authCardWrapper', opacity: [1, 0], translateY: [0, -10], duration: 250, easing: 'easeInCubic',
      complete: () => { localStorage.setItem('chatapp_token', JSON.stringify(d)); window.location.href = '/static/'; }
    });
  } catch (err) {
    errEl.textContent = err.message;
    anime({ targets: '#regErr', keyframes: [{ translateX: -4 }, { translateX: 4 }, { translateX: -2 }, { translateX: 0 }], duration: 250, easing: 'easeInOutSine' });
  }
}

// If already logged in, go straight to app
if (localStorage.getItem('chatapp_token')) {
  try {
    const d = JSON.parse(localStorage.getItem('chatapp_token'));
    if (d && d.token) window.location.href = '/static/';
  } catch (e) {}
}
</script>
</body>
</html>

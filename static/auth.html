<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatApp — Sign In</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
<script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.82/build/spline-viewer.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { font-family: 'Inter', system-ui, sans-serif; }
  body { background: #030712; overflow: hidden; }
  input:-webkit-autofill { -webkit-box-shadow: 0 0 0 100px #111827 inset !important; -webkit-text-fill-color: #f9fafb !important; }
  .gradient-text { background: linear-gradient(135deg, #fbbf24, #f59e0b, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .glass { background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .input-field { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #f9fafb; transition: all .2s; }
  .input-field:focus { outline: none; border-color: #f59e0b; background: rgba(255,255,255,0.06); box-shadow: 0 0 0 3px rgba(245,158,11,0.12); }
  .input-field::placeholder { color: rgba(255,255,255,.3); }
  .tab-active { background: rgba(245,158,11,0.12); color: #fbbf24; border-color: rgba(245,158,11,0.25) !important; }
  .tab-inactive { color: rgba(255,255,255,.4); border-color: transparent !important; }
  .btn-primary { background: linear-gradient(135deg, #f59e0b, #d97706); color: #1a0f00; box-shadow: 0 4px 20px rgba(245,158,11,0.3); transition: all .18s; }
  .btn-primary:hover { box-shadow: 0 6px 28px rgba(245,158,11,0.5); transform: translateY(-1px); }
  .btn-primary:active { transform: scale(.98) translateY(0); }
  .form-panel { opacity: 0; transform: translateX(20px); }
  .field-icon { color: rgba(255,255,255,.3); }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.08); }
  spline-viewer { position: absolute; inset: 0; width: 100%; height: 100%; }
  .left-overlay { background: linear-gradient(135deg, rgba(3,7,18,.1) 0%, rgba(3,7,18,.05) 50%, rgba(3,7,18,.2) 100%); }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .float { animation: float 4s ease-in-out infinite; }
  .particle { position: absolute; width: 3px; height: 3px; border-radius: 50%; background: #f59e0b; opacity: 0; }
</style>
</head>
<body class="h-screen flex items-stretch select-none">

<!-- LEFT: Spline 3D Scene -->
<div class="relative flex-1 overflow-hidden hidden md:block" id="leftPanel">
  <spline-viewer url="https://prod.spline.design/kZDDjO5HuC9UGAHT/scene.splinecode" id="splineEl" events-target="local"></spline-viewer>
  <div class="left-overlay absolute inset-0 pointer-events-none"></div>

  <!-- Particles -->
  <div id="particles" class="absolute inset-0 pointer-events-none overflow-hidden"></div>

  <!-- Bottom text -->
  <div class="absolute bottom-0 left-0 right-0 p-10 pointer-events-none" id="leftText" style="opacity:0">
    <div class="text-4xl font-extrabold text-white leading-tight tracking-tight mb-3">
      Real conversations.<br>
      <span class="gradient-text">No noise.</span>
    </div>
    <p class="text-white/40 text-sm font-light tracking-wide">Secure end-to-end messaging for people who value clarity.</p>
    <div class="flex items-center gap-3 mt-6">
      <div class="flex -space-x-2">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-amber-400 to-orange-500 border-2 border-black flex items-center justify-center text-black text-xs font-bold">A</div>
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-violet-400 to-purple-600 border-2 border-black flex items-center justify-center text-white text-xs font-bold">B</div>
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-green-600 border-2 border-black flex items-center justify-center text-white text-xs font-bold">C</div>
      </div>
      <span class="text-white/40 text-xs">Join thousands already chatting</span>
    </div>
  </div>
</div>

<!-- RIGHT: Auth Form -->
<div class="w-full md:w-[420px] flex-shrink-0 flex items-center justify-center p-6 relative overflow-y-auto" style="background:#080d1a;border-left:1px solid rgba(255,255,255,.05)">

  <!-- Ambient glow -->
  <div class="absolute top-0 right-0 w-64 h-64 rounded-full pointer-events-none" style="background:radial-gradient(circle,rgba(245,158,11,.06) 0%,transparent 70%);transform:translate(30%,-30%)"></div>
  <div class="absolute bottom-0 left-0 w-64 h-64 rounded-full pointer-events-none" style="background:radial-gradient(circle,rgba(124,58,237,.04) 0%,transparent 70%);transform:translate(-30%,30%)"></div>

  <div class="w-full max-w-sm relative z-10" id="authCard" style="opacity:0">

    <!-- Logo -->
    <div class="text-center mb-8" id="logoArea">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4 float" style="background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 8px 32px rgba(245,158,11,.3)">
        <svg class="w-7 h-7 text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">ChatApp</h1>
      <p class="text-white/30 text-xs mt-1 tracking-wide">CONNECT · COMMUNICATE · COLLABORATE</p>
    </div>

    <!-- Tabs -->
    <div class="flex rounded-xl p-1 mb-6" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)">
      <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2.5 text-sm font-semibold rounded-lg border tab-active transition-all duration-200">Sign In</button>
      <button id="tabReg" onclick="switchTab('reg')" class="flex-1 py-2.5 text-sm font-semibold rounded-lg border tab-inactive transition-all duration-200">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="form-panel space-y-4" onsubmit="doLogin(event)">
      <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 field-icon">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input id="loginId" type="text" placeholder="Email or Username" autocomplete="username"
          class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium" />
      </div>
      <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 field-icon">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input id="loginPw" type="password" placeholder="Password" autocomplete="current-password"
          class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium" />
      </div>
      <button type="submit" class="btn-primary w-full py-3 rounded-xl text-sm font-bold tracking-wide mt-2">
        Sign In →
      </button>
      <div id="loginErr" class="text-red-400 text-xs text-center min-h-4 font-medium"></div>
    </form>

    <!-- REGISTER FORM -->
    <form id="regForm" class="form-panel space-y-4 hidden" onsubmit="doRegister(event)">
      <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 field-icon">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        <input id="regUser" type="text" placeholder="Username" autocomplete="username"
          class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium" />
      </div>
      <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 field-icon">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </span>
        <input id="regEmail" type="email" placeholder="Email" autocomplete="email"
          class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium" />
      </div>
      <div class="relative">
        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 field-icon">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input id="regPw" type="password" placeholder="Password (min 6, 1 letter + 1 number)" autocomplete="new-password"
          class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-sm font-medium" />
      </div>
      <button type="submit" class="btn-primary w-full py-3 rounded-xl text-sm font-bold tracking-wide mt-2">
        Create Account →
      </button>
      <div id="regErr" class="text-red-400 text-xs text-center min-h-4 font-medium"></div>
    </form>

    <!-- Footer -->
    <p class="text-white/15 text-xs text-center mt-8 tracking-widest uppercase">Secure · Private · Fast</p>
  </div>
</div>

<script>
const API = window.location.origin;
let activeTab = 'login';

// ===== ANIMATE IN =====
window.addEventListener('load', () => {
  anime({ targets: '#authCard', opacity: [0, 1], translateX: [30, 0], duration: 600, easing: 'easeOutExpo', delay: 200 });
  anime({ targets: '#leftText', opacity: [0, 1], translateY: [20, 0], duration: 700, easing: 'easeOutExpo', delay: 400 });
  anime({ targets: '#loginForm', opacity: [0, 1], translateX: [16, 0], duration: 500, easing: 'easeOutExpo', delay: 350 });
  spawnParticles();
});

// ===== PARTICLES =====
function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    container.appendChild(p);
    anime({
      targets: p,
      opacity: [0, 0.6, 0],
      translateY: [0, -(60 + Math.random() * 80)],
      translateX: [(Math.random() - 0.5) * 40],
      scale: [0, 1.5, 0],
      duration: 3000 + Math.random() * 3000,
      delay: Math.random() * 3000,
      easing: 'easeInOutSine',
      loop: true,
    });
  }
}

// ===== TABS =====
function switchTab(tab) {
  activeTab = tab;
  const isLogin = tab === 'login';

  document.getElementById('tabLogin').className = `flex-1 py-2.5 text-sm font-semibold rounded-lg border transition-all duration-200 ${isLogin ? 'tab-active' : 'tab-inactive'}`;
  document.getElementById('tabReg').className = `flex-1 py-2.5 text-sm font-semibold rounded-lg border transition-all duration-200 ${isLogin ? 'tab-inactive' : 'tab-active'}`;

  const showForm = isLogin ? 'loginForm' : 'regForm';
  const hideForm = isLogin ? 'regForm' : 'loginForm';

  const hideEl = document.getElementById(hideForm);
  anime({ targets: hideEl, opacity: [1, 0], translateX: [0, isLogin ? 16 : -16], duration: 160, easing: 'easeInCubic',
    complete: () => {
      hideEl.classList.add('hidden');
      const showEl = document.getElementById(showForm);
      showEl.classList.remove('hidden');
      anime({ targets: showEl, opacity: [0, 1], translateX: [isLogin ? -16 : 16, 0], duration: 220, easing: 'easeOutCubic' });
    }
  });

  document.getElementById('loginErr').textContent = '';
  document.getElementById('regErr').textContent = '';
}

// ===== AUTH CALLS =====
async function doLogin(e) {
  e.preventDefault();
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  const isEmail = id.includes('@');
  const body = isEmail ? { email: id, password: pw } : { username: id, password: pw };
  try {
    const r = await fetch(`${API}/api/v1/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Login failed');
    anime({ targets: '#authCard', opacity: [1, 0], translateY: [0, -10], duration: 250, easing: 'easeInCubic',
      complete: () => { localStorage.setItem('chatapp_token', JSON.stringify(d)); window.location.href = '/static/'; }
    });
  } catch (err) {
    errEl.textContent = err.message;
    anime({ targets: '#loginErr', keyframes: [{ translateX: -5 }, { translateX: 5 }, { translateX: -3 }, { translateX: 0 }], duration: 280, easing: 'easeInOutSine' });
  }
}

async function doRegister(e) {
  e.preventDefault();
  const errEl = document.getElementById('regErr');
  errEl.textContent = '';
  try {
    const r = await fetch(`${API}/api/v1/auth/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: document.getElementById('regUser').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPw').value })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Registration failed');
    anime({ targets: '#authCard', opacity: [1, 0], translateY: [0, -10], duration: 250, easing: 'easeInCubic',
      complete: () => { localStorage.setItem('chatapp_token', JSON.stringify(d)); window.location.href = '/static/'; }
    });
  } catch (err) {
    errEl.textContent = err.message;
    anime({ targets: '#regErr', keyframes: [{ translateX: -5 }, { translateX: 5 }, { translateX: -3 }, { translateX: 0 }], duration: 280, easing: 'easeInOutSine' });
  }
}

// If already logged in, go straight to app
if (localStorage.getItem('chatapp_token')) {
  try {
    const d = JSON.parse(localStorage.getItem('chatapp_token'));
    if (d && d.token) window.location.href = '/static/';
  } catch (e) {}
}
</script>
</body>
</html>

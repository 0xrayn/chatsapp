<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatApp</title>
<style>
  :root {
    --bg: #0b141a;
    --panel: #111b21;
    --panel-light: #202c33;
    --border: #2a3942;
    --accent: #00a884;
    --accent-light: #06cf9c;
    --text: #e9edef;
    --text-dim: #8696a0;
    --bubble-me: #005c4b;
    --bubble-other: #202c33;
    --red: #f15c6d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  /* ---- Auth Screen ---- */
  #authScreen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 360px;
    text-align: center;
  }
  .auth-box h1 { font-size: 22px; margin-bottom: 4px; }
  .auth-box .sub { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }
  .auth-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--panel-light);
    color: var(--text);
    font-size: 14px;
  }
  .auth-box button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    font-size: 14px;
  }
  .auth-box button.secondary { background: transparent; color: var(--accent-light); border: 1px solid var(--border); }
  .auth-box .error { color: var(--red); font-size: 12px; margin-top: 8px; min-height: 16px; }
  .tabs { display: flex; margin-bottom: 16px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .tabs button { margin: 0; border-radius: 0; background: var(--panel-light); color: var(--text-dim); }
  .tabs button.active { background: var(--accent); color: #fff; }

  /* ---- Main App ---- */
  #app { display: none; height: 100vh; }
  #app.visible { display: flex; }

  /* Sidebar */
  .sidebar {
    width: 380px;
    min-width: 320px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .me { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: #fff;
    flex-shrink: 0;
  }
  .avatar.small { width: 32px; height: 32px; font-size: 13px; }
  .me-name { font-weight: 600; font-size: 15px; }
  .me .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent-light); display:inline-block; margin-left:6px; }
  .logout-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 13px; padding: 6px 10px; border-radius: 6px; }
  .logout-btn:hover { background: var(--panel-light); color: var(--text); }

  .search-box { padding: 10px 14px; }
  .search-box input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 20px;
    border: none;
    background: var(--panel-light);
    color: var(--text);
    font-size: 14px;
  }
  .search-box input::placeholder { color: var(--text-dim); }

  .list { flex: 1; overflow-y: auto; }
  .section-label { padding: 8px 16px 4px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }

  .list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background .1s;
  }
  .list-item:hover { background: var(--panel-light); }
  .list-item.active { background: var(--panel-light); }
  .list-item-info { flex: 1; min-width: 0; }
  .list-item-name { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .list-item-sub { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-light); flex-shrink: 0; }
  .empty-hint { padding: 30px 20px; text-align: center; color: var(--text-dim); font-size: 13px; }

  /* Chat Area */
  .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
  .chat-placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 15px;
    flex-direction: column;
    gap: 8px;
  }
  .chat-header {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .chat-header .name { font-weight: 600; font-size: 16px; }
  .chat-header .sub { font-size: 12px; color: var(--text-dim); }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 8% 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg-row { display: flex; }
  .msg-row.me { justify-content: flex-end; }
  .msg {
    max-width: 65%;
    padding: 8px 12px;
    border-radius: 10px;
    background: var(--bubble-other);
    font-size: 14.5px;
    line-height: 1.4;
    position: relative;
    word-wrap: break-word;
  }
  .msg.me { background: var(--bubble-me); }
  .msg .sender { font-size: 12px; color: var(--accent-light); font-weight: 600; margin-bottom: 2px; }
  .msg .time { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-align: right; }
  .msg.system-msg { align-self: center; background: transparent; color: var(--text-dim); font-size: 12px; font-style: italic; padding: 4px; }

  .typing-indicator { font-size: 12px; color: var(--text-dim); padding: 0 8% 6px; min-height: 18px; font-style: italic; }

  .composer {
    display: flex;
    gap: 10px;
    padding: 12px 8%;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  .composer input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 20px;
    border: none;
    background: var(--panel-light);
    color: var(--text);
    font-size: 14px;
  }
  .composer button {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
  }
  .composer button:hover { background: var(--accent-light); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-box">
    <h1>💬 ChatApp</h1>
    <div class="sub">Real-time chat for everyone</div>

    <div class="tabs">
      <button id="tabLogin" class="active">Login</button>
      <button id="tabRegister">Register</button>
    </div>

    <div id="loginForm">
      <input id="loginEmail" placeholder="Email" type="email" />
      <input id="loginPassword" placeholder="Password" type="password" />
      <button id="loginBtn">Login</button>
    </div>

    <div id="registerForm" style="display:none">
      <input id="regUsername" placeholder="Username" />
      <input id="regEmail" placeholder="Email" type="email" />
      <input id="regPassword" placeholder="Password (min 6 chars, 1 letter + 1 number)" type="password" />
      <button id="registerBtn">Create Account</button>
    </div>

    <div class="error" id="authError"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="me">
        <div class="avatar" id="myAvatar">?</div>
        <div>
          <div class="me-name" id="myName">—</div>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <div class="search-box">
      <input id="userSearch" placeholder="🔍 Search username to start chat..." />
    </div>

    <div class="list" id="sidebarList">
      <div class="section-label">Chats</div>
      <div id="conversationList"></div>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-placeholder" id="chatPlaceholder">
      <div style="font-size:48px">💬</div>
      <div>Select a conversation or search a username to start chatting</div>
    </div>

    <div id="chatPanel" style="display:none; flex-direction:column; flex:1;">
      <div class="chat-header">
        <div class="avatar small" id="chatAvatar">?</div>
        <div>
          <div class="name" id="chatName">—</div>
          <div class="sub" id="chatStatus">offline</div>
        </div>
      </div>

      <div class="messages" id="messages"></div>
      <div class="typing-indicator" id="typingIndicator"></div>

      <div class="composer">
        <input id="msgInput" placeholder="Type a message" autocomplete="off" />
        <button id="sendBtn">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let token = null, myUser = null, ws = null;
let currentRoom = null, currentPartner = null;
let typingTimeout = null;
let conversations = []; // {room_id, name, isOnline, isDM, otherUser}

const $ = id => document.getElementById(id);

// ---- AUTH ----
$('tabLogin').onclick = () => { $('tabLogin').classList.add('active'); $('tabRegister').classList.remove('active'); $('loginForm').style.display='block'; $('registerForm').style.display='none'; $('authError').textContent=''; };
$('tabRegister').onclick = () => { $('tabRegister').classList.add('active'); $('tabLogin').classList.remove('active'); $('registerForm').style.display='block'; $('loginForm').style.display='none'; $('authError').textContent=''; };

$('loginBtn').onclick = async () => {
  $('authError').textContent = '';
  try {
    const res = await fetch(`${API}/api/v1/auth/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email: $('loginEmail').value, password: $('loginPassword').value })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    onAuthSuccess(data);
  } catch (e) { $('authError').textContent = e.message; }
};

$('registerBtn').onclick = async () => {
  $('authError').textContent = '';
  try {
    const res = await fetch(`${API}/api/v1/auth/register`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: $('regUsername').value, email: $('regEmail').value, password: $('regPassword').value })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || data.details || 'Register failed');
    onAuthSuccess(data);
  } catch (e) { $('authError').textContent = e.message; }
};

function onAuthSuccess(data) {
  token = data.token;
  myUser = data.user;
  localStorage = null; // not used, in-memory only per instructions
  $('authScreen').style.display = 'none';
  $('app').classList.add('visible');
  $('myName').textContent = myUser.username;
  $('myAvatar').textContent = myUser.username[0].toUpperCase();
  connectWS();
  loadConversations();
}

$('logoutBtn').onclick = () => {
  if (ws) ws.close();
  token = null; myUser = null; currentRoom = null;
  $('app').classList.remove('visible');
  $('authScreen').style.display = 'flex';
  $('conversationList').innerHTML = '';
  $('messages').innerHTML = '';
  $('chatPanel').style.display = 'none';
  $('chatPlaceholder').style.display = 'flex';
};

// ---- API HELPER ----
async function api(path, opts = {}) {
  const res = await fetch(`${API}/api/v1${path}`, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers||{}) }
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ---- CONVERSATIONS ----
async function loadConversations() {
  try {
    const dms = await api('/dm');
    conversations = (dms.data || []).map(d => ({
      room_id: d.room.id,
      name: d.other_user.username,
      isOnline: d.other_user.is_online,
      isDM: true,
      otherUser: d.other_user
    }));
    renderConversations();
  } catch (e) { console.error(e); }
}

function renderConversations() {
  const el = $('conversationList');
  if (conversations.length === 0) {
    el.innerHTML = '<div class="empty-hint">No conversations yet.<br>Search a username above to start chatting!</div>';
    return;
  }
  el.innerHTML = conversations.map(c => `
    <div class="list-item ${currentRoom === c.room_id ? 'active' : ''}" data-room="${c.room_id}" data-name="${c.name}">
      <div class="avatar">${c.name[0].toUpperCase()}</div>
      <div class="list-item-info">
        <div class="list-item-name">${escapeHtml(c.name)} ${c.isOnline ? '<span class=\"online-dot\"></span>' : ''}</div>
        <div class="list-item-sub">${c.isOnline ? 'Online' : 'Offline'}</div>
      </div>
    </div>
  `).join('');

  el.querySelectorAll('.list-item').forEach(item => {
    item.onclick = () => openConversation(item.dataset.room, item.dataset.name);
  });
}

// ---- USER SEARCH ----
let searchDebounce = null;
$('userSearch').oninput = (e) => {
  clearTimeout(searchDebounce);
  const q = e.target.value.trim();
  if (!q) { renderConversations(); return; }
  searchDebounce = setTimeout(() => searchUsers(q), 300);
};

async function searchUsers(q) {
  try {
    const res = await api(`/users/search?q=${encodeURIComponent(q)}`);
    const users = res.data || [];
    const el = $('conversationList');
    if (users.length === 0) {
      el.innerHTML = '<div class="empty-hint">No users found</div>';
      return;
    }
    el.innerHTML = `<div class="section-label">Search Results</div>` + users.map(u => `
      <div class="list-item" data-userid="${u.id}" data-username="${u.username}">
        <div class="avatar">${u.username[0].toUpperCase()}</div>
        <div class="list-item-info">
          <div class="list-item-name">${escapeHtml(u.username)} ${u.is_online ? '<span class=\"online-dot\"></span>' : ''}</div>
          <div class="list-item-sub">Click to start chat</div>
        </div>
      </div>
    `).join('');

    el.querySelectorAll('.list-item').forEach(item => {
      item.onclick = () => startDM(item.dataset.userid, item.dataset.username);
    });
  } catch (e) { console.error(e); }
}

async function startDM(userId, username) {
  try {
    const room = await api('/dm', { method: 'POST', body: JSON.stringify({ recipient_id: userId }) });
    $('userSearch').value = '';
    await loadConversations();
    openConversation(room.id, username);
  } catch (e) { alert(e.message); }
}

// ---- OPEN CONVERSATION ----
async function openConversation(roomId, name) {
  // Leave previous room
  if (currentRoom && ws && ws.readyState === 1) {
    send('leave_room', { room_id: currentRoom });
  }

  currentRoom = roomId;
  currentPartner = name;

  $('chatPlaceholder').style.display = 'none';
  $('chatPanel').style.display = 'flex';
  $('chatName').textContent = name;
  $('chatAvatar').textContent = name[0].toUpperCase();
  $('chatStatus').textContent = '';
  $('messages').innerHTML = '';
  $('typingIndicator').textContent = '';

  renderConversations();

  // Load history
  try {
    const res = await api(`/rooms/${roomId}/messages?page=1&limit=50`);
    (res.data || []).forEach(m => renderMessage(m));
    scrollToBottom();
  } catch (e) { console.error(e); }

  // Join room via WS
  if (ws && ws.readyState === 1) {
    send('join_room', { room_id: roomId });
  }
}

// ---- WEBSOCKET ----
function connectWS() {
  const base = API.replace(/^http/, 'ws');
  ws = new WebSocket(`${base}/api/v1/ws?token=${token}`);

  ws.onopen = () => {
    if (currentRoom) send('join_room', { room_id: currentRoom });
  };

  ws.onclose = () => {
    setTimeout(() => { if (token) connectWS(); }, 2000); // auto-reconnect
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleEvent(data);
  };
}

function send(type, payload) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type, payload }));
}

function handleEvent(data) {
  switch (data.type) {
    case 'new_message': {
      const m = data.payload;
      if (m.room_id === currentRoom) {
        renderMessage(m);
        scrollToBottom();
      }
      break;
    }
    case 'typing':
      if (data.payload.room_id === currentRoom && data.payload.user_id !== myUser.id) {
        $('typingIndicator').textContent = `${data.payload.username} is typing...`;
      }
      break;
    case 'stop_typing':
      if (data.payload.room_id === currentRoom) {
        $('typingIndicator').textContent = '';
      }
      break;
    case 'user_online':
    case 'user_offline': {
      const isOnline = data.type === 'user_online';
      conversations.forEach(c => { if (c.otherUser && c.otherUser.id === data.payload.user_id) c.isOnline = isOnline; });
      renderConversations();
      if (currentPartner && data.payload.username === currentPartner) {
        $('chatStatus').textContent = isOnline ? 'Online' : 'Offline';
      }
      break;
    }
  }
}

// ---- MESSAGES ----
function renderMessage(m) {
  const isMe = (m.sender_id || (m.sender && m.sender.id)) === myUser.id;
  const senderName = m.sender ? m.sender.username : '';
  const time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

  const row = document.createElement('div');
  row.className = `msg-row ${isMe ? 'me' : ''}`;
  row.innerHTML = `
    <div class="msg ${isMe ? 'me' : ''}">
      ${escapeHtml(m.content)}
      <div class="time">${time}</div>
    </div>
  `;
  $('messages').appendChild(row);
}

function scrollToBottom() {
  const el = $('messages');
  el.scrollTop = el.scrollHeight;
}

// ---- COMPOSER ----
$('sendBtn').onclick = sendMessage;
$('msgInput').onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
$('msgInput').oninput = () => {
  if (!currentRoom) return;
  send('typing', { room_id: currentRoom });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => send('stop_typing', { room_id: currentRoom }), 1200);
};

function sendMessage() {
  const content = $('msgInput').value.trim();
  if (!content || !currentRoom) return;
  send('send_message', { room_id: currentRoom, content });
  $('msgInput').value = '';
  send('stop_typing', { room_id: currentRoom });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
